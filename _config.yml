# Jekyll Configuration
title: 鼠标与键盘市场情报平台
email: contact@peripherals-report.com
description: >-
  每日追踪鼠标与键盘新品、价格、品牌动向与渠道趋势的市场情报平台
baseurl: "/peripherals-industry-report"
url: "https://lhd-0218.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Permalink structure
permalink: /reports/:categories/:year/:month/:day/:title/

# Pagination
paginate: 10
paginate_path: "/reports/page:num/"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - scripts/

# Directories
source: .
destination: _site

# Categories for reports
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: 外设市场情报分析师

# Custom variables
report_types:
  - name: 日报
    slug: daily
    color: "#6366f1"
  - name: 周报  
    slug: weekly
    color: "#f72585"
  - name: 月报
    slug: monthly
    color: "#7209b7"
  - name: 总结报告
    slug: summary
    color: "#06d6a0"

# SEO settings
seo:
  type: "WebSite"
  name: "鼠标与键盘市场情报平台"
  description: "每日追踪鼠标与键盘新品、价格、品牌动向与渠道趋势的市场情报平台"
  author: "外设市场情报分析师"
  social:
    links:
      - "https://github.com/LHD-0218"