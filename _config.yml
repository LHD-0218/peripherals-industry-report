# Jekyll Configuration
title: 外设行业报告
email: contact@peripherals-report.com
description: >-
  专业的外设行业分析报告平台，提供市场趋势、产品评测和数据洞察。
baseurl: ""
url: "https://lhd-0218.github.io/peripherals-industry-report"
twitter_username: peripherals_report
github_username: LHD-0218

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Permalink structure
permalink: /:categories/:year/:month/:day/:title/

# Pagination
paginate: 10
paginate_path: "/reports/page:num/"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Collections
collections:
  reports:
    output: true
    permalink: /reports/:path/

# Categories for reports
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: 外设行业分析师
  - scope:
      path: ""
      type: "reports"
    values:
      layout: report

# Custom variables
report_types:
  - name: 日报
    slug: daily
    color: "#4361ee"
  - name: 周报  
    slug: weekly
    color: "#f72585"
  - name: 月报
    slug: monthly
    color: "#7209b7"
  - name: 总结报告
    slug: summary
    color: "#06d6a0"

# SEO settings
seo:
  type: "WebSite"
  name: "外设行业报告"
  description: "专业的外设行业分析报告平台"
  author: "外设行业分析师"
  social:
    links:
      - "https://github.com/LHD-0218"