<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    
    <!-- Google Fonts - Inter for professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href=" https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css ">
    <!-- Custom CSS -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --bg-surface: #0f172a;
            --bg-card: rgba(15, 23, 42, 0.8);
            --border-color: rgba(148, 163, 184, 0.2);
            --glow-primary: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-surface);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* Navigation */
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 500;
            position: relative;
        }
        
        .nav-link:hover {
            color: var(--text-primary) !important;
        }
        
        .nav-link.active {
            color: var(--primary) !important;
        }
        
        /* Hero Section */
        .hero-section {
            padding: 6rem 0 4rem;
        }
        
        .hero-content h1 {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .hero-content p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
            border-radius: 12px;
            box-shadow: var(--glow-primary);
        }
        
        .btn-outline-light {
            border: 2px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 0.75rem 2rem;
            font-weight: 600;
            border-radius: 12px;
        }
        
        /* Intelligence Panel */
        .intelligence-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--glow-primary);
        }
        
        .panel-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }
        
        .metric-item {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .metric-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .metric-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.25rem;
            font-size: 1.5rem;
            background: rgba(99, 102, 241, 0.1);
        }
        
        .metric-value {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }
        
        .metric-label {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        
        /* KPI Cards */
        .kpi-section {
            padding: 5rem 0;
        }
        
        .section-title h2 {
            font-size: 2.75rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
            text-align: center;
        }
        
        .section-title p {
            color: var(--text-secondary);
            max-width: 650px;
            margin: 0 auto 3.5rem;
            line-height: 1.7;
            font-size: 1.125rem;
            text-align: center;
        }
        
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .kpi-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: var(--glow-primary);
        }
        
        .kpi-icon {
            font-size: 3rem;
            margin-bottom: 1.75rem;
            color: var(--primary);
        }
        
        .kpi-value {
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }
        
        .kpi-label {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
        }
        
        .kpi-badge {
            display: inline-block;
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        /* Report Tabs */
        .report-tabs {
            background: var(--bg-surface);
            padding: 5rem 0;
        }
        
        .nav-tabs {
            border-bottom: none;
            justify-content: center;
            margin-bottom: 2.5rem;
            gap: 0.5rem;
        }
        
        .nav-tabs .nav-link {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 0.85rem 2.5rem;
            margin: 0 0.25rem;
            color: var(--text-secondary) !important;
            font-weight: 600;
            font-size: 1.125rem;
        }
        
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white !important;
            border-color: var(--primary);
        }
        
        .tab-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0 0 20px 20px;
            padding: 2.5rem;
        }
        
        /* Report Cards */
        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
        }
        
        .report-card:hover {
            transform: translateY(-6px);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: var(--glow-primary);
        }
        
        .report-type {
            padding: 0.35rem 1.25rem;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }
        
        .report-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }
        
        .read-more {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Footer */
        .footer {
            background: rgba(15, 23, 42, 0.95);
            padding: 4rem 0 2.5rem;
            border-top: 1px solid var(--border-color);
            margin-top: 5rem;
        }
        
        .footer-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.75rem;
            color: var(--text-primary);
        }
        
        /* Responsive Design */
        @media (max-width: 992px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }
            
            .btn-container {
                flex-direction: column;
                gap: 1.25rem;
            }
            
            .btn-container .btn {
                width: 100%;
            }
        }
        
        @media (max-width: 768px) {
            .hero-section {
                padding: 4rem 0 2.5rem;
            }
            
            .section-title h2 {
                font-size: 2.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{{ '/' | relative_url }}">鼠标与键盘市场情报平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ '/' | relative_url }}">首页</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            报告中心
                        </a>
                        <ul class="dropdown-menu bg-dark border-0">
                            <li><a class="dropdown-item text-light" href="/reports/daily/">日报</a></li>
                            <li><a class="dropdown-item text-light" href="/reports/weekly/">周报</a></li>
                            <li><a class="dropdown-item text-light" href="/reports/monthly/">月报</a></li>
                            <li><a class="dropdown-item text-light" href="/reports/summary/">总结报告</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">品牌追踪</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">价格趋势</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">关于</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {{ content }}

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h3 class="footer-title">鼠标与键盘市场情报平台</h3>
                    <p class="text-muted">专业的外设市场情报分析平台，提供实时数据洞察和深度研究报告。</p>
                </div>
                <div class="col-md-3">
                    <h4 class="footer-title">快速链接</h4>
                    <div class="footer-links">
                        <a href="{{ '/' | relative_url }}" class="text-secondary" style="text-decoration: none; display: block; margin-bottom: 1rem;">首页</a>
                        <a href="/reports/daily/" class="text-secondary" style="text-decoration: none; display: block; margin-bottom: 1rem;">日报</a>
                        <a href="/reports/weekly/" class="text-secondary" style="text-decoration: none; display: block; margin-bottom: 1rem;">周报</a>
                        <a href="/reports/monthly/" class="text-secondary" style="text-decoration: none; display: block; margin-bottom: 1rem;">月报</a>
                        <a href="/reports/summary/" class="text-secondary" style="text-decoration: none; display: block; margin-bottom: 1rem;">总结报告</a>
                    </div>
                </div>
                <div class="col-md-3">
                    <h4 class="footer-title">联系我们</h4>
                    <div class="footer-links">
                        <a href="mailto:contact@peripherals-report.com" class="text-secondary" style="text-decoration: none; display: block; margin-bottom: 1rem;"><i class="fas fa-envelope me-2"></i>Email</a>
                        <a href="https://github.com/LHD-0218" target="_blank" class="text-secondary" style="text-decoration: none; display: block; margin-bottom: 1rem;"><i class="fab fa-github me-2"></i>GitHub</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom" style="border-top: 1px solid var(--border-color); padding-top: 2.5rem; margin-top: 2.5rem; text-align: center; color: var(--text-secondary);">
                <p>&copy; 2026 鼠标与键盘市场情报平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
