<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    
    <!-- Google Fonts - Inter for professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --bg-surface: #0a0f1a;
            --bg-card: rgba(15, 23, 42, 0.88);
            --border-color: rgba(148, 163, 184, 0.12);
            --glow-primary: 0 0 28px rgba(99, 102, 241, 0.45);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-surface);
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(99, 102, 241, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 85% 75%, rgba(139, 92, 246, 0.08) 0%, transparent 30%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%);
            background-size: 100% 100%, 100% 100%, 24px 24px, 24px 24px;
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Navigation */
        .navbar {
            background: rgba(10, 15, 26, 0.98);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 600;
            position: relative;
            transition: var(--transition);
            letter-spacing: -0.2px;
        }
        
        .nav-link:hover {
            color: var(--text-primary) !important;
        }
        
        .nav-link.active {
            color: var(--primary) !important;
        }
        
        /* Hero Section */
        .hero-section {
            padding: 6.5rem 0 4.5rem;
            position: relative;
        }
        
        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 1.4rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-primary), #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-content p {
            font-size: 1.4rem;
            color: var(--text-secondary);
            max-width: 620px;
            margin-bottom: 2.8rem;
            line-height: 1.55;
            font-weight: 400;
            opacity: 0.95;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 0.9rem 2.4rem;
            font-weight: 700;
            border-radius: 16px;
            transition: var(--transition);
            box-shadow: var(--glow-primary);
            position: relative;
            overflow: hidden;
            font-size: 1.15rem;
            letter-spacing: -0.3px;
        }
        
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: var(--glow-primary), 0 14px 35px rgba(99, 102, 241, 0.55);
        }
        
        .btn-outline-light {
            border: 2px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 0.9rem 2.4rem;
            font-weight: 700;
            border-radius: 16px;
            transition: var(--transition);
            font-size: 1.15rem;
            letter-spacing: -0.3px;
        }
        
        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
            border-color: var(--primary);
            color: var(--primary) !important;
        }
        
        /* Intelligence Panel */
        .intelligence-panel {
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--glow-primary);
            height: 100%;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .intelligence-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            opacity: 0.35;
            z-index: -1;
        }
        
        .intelligence-panel:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.65);
        }
        
        .panel-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            letter-spacing: -0.5px;
        }
        
        .metric-item {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .metric-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .metric-item:hover {
            transform: translateX(8px);
        }
        
        .metric-icon {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.6rem;
            font-size: 1.8rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.18), rgba(139, 92, 246, 0.18));
            transition: var(--transition);
        }
        
        .metric-value {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            line-height: 1.15;
            letter-spacing: -0.5px;
        }
        
        .metric-label {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 600;
            opacity: 0.9;
        }
        
        .trend-chart {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 1.7rem;
            margin-top: 2rem;
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
            transition: var(--transition);
            border: 1px solid rgba(99, 102, 241, 0.25);
        }
        
        .trend-chart:hover {
            background: rgba(99, 102, 241, 0.18);
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.45);
        }
        
        /* KPI Cards */
        .kpi-section {
            padding: 6rem 0;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 4.5rem;
        }
        
        .section-title h2 {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 1.6rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section-title p {
            color: var(--text-secondary);
            max-width: 720px;
            margin: 0 auto;
            line-height: 1.65;
            font-size: 1.3rem;
            font-weight: 400;
            opacity: 0.9;
        }
        
        .kpi-card {
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3.2rem;
            text-align: center;
            transition: var(--transition);
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
        }
        
        .kpi-card:hover {
            transform: translateY(-12px);
            border-color: rgba(99, 102, 241, 0.75);
            box-shadow: var(--glow-primary), 0 28px 55px rgba(0, 0, 0, 0.45);
        }
        
        .kpi-card:hover::before {
            opacity: 1;
        }
        
        .kpi-icon {
            font-size: 3.5rem;
            margin-bottom: 2.2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .kpi-value {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 1.6rem;
            color: var(--text-primary);
            line-height: 1.05;
            letter-spacing: -1px;
        }
        
        .kpi-label {
            font-size: 1.4rem;
            color: var(--text-secondary);
            margin-bottom: 1.6rem;
            font-weight: 700;
            opacity: 0.95;
        }
        
        .kpi-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 1.4rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            background: rgba(16, 185, 129, 0.28);
            color: #10b981;
            margin-top: 0.8rem;
            transition: var(--transition);
            border: 1px solid rgba(16, 185, 129, 0.35);
            letter-spacing: -0.3px;
        }
        
        .kpi-source {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 1.2rem;
            font-weight: 400;
            line-height: 1.5;
            opacity: 0.85;
        }
        
        .mini-trend {
            display: flex;
            justify-content: center;
            margin-top: 1.4rem;
            height: 32px;
            align-items: center;
        }
        
        .mini-trend-bar {
            width: 85px;
            height: 4.5px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2.5px;
            position: relative;
        }
        
        /* Report Tabs */
        .report-tabs {
            background: var(--bg-surface);
            padding: 6rem 0;
        }
        
        .nav-tabs {
            border-bottom: none;
            justify-content: center;
            margin-bottom: 3.2rem;
            gap: 0.8rem;
            padding: 0 2.2rem;
        }
        
        .nav-tabs .nav-link {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 1.1rem 3rem;
            margin: 0 0.4rem;
            color: var(--text-secondary) !important;
            font-weight: 800;
            font-size: 1.3rem;
            transition: var(--transition);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            letter-spacing: -0.3px;
        }
        
        .nav-tabs .nav-link:hover {
            border-color: var(--primary);
            color: var(--primary) !important;
            transform: translateY(-4px);
        }
        
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white !important;
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: var(--glow-primary);
        }
        
        .tab-content {
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border-color);
            border-radius: 0 0 24px 24px;
            padding: 3.2rem;
            animation: fadeIn 0.65s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Report Cards */
        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.4rem;
            transition: var(--transition);
            height: 100%;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            position: relative;
            overflow: hidden;
        }
        
        .report-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
        }
        
        .report-card:hover {
            transform: translateY(-10px);
            border-color: rgba(99, 102, 241, 0.75);
            box-shadow: var(--glow-primary), 0 22px 45px rgba(0, 0, 0, 0.4);
        }
        
        .report-card:hover::before {
            opacity: 1;
        }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.6rem;
            gap: 1.4rem;
        }
        
        .report-type {
            padding: 0.5rem 1.6rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }
        
        .report-date {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 600;
            align-self: center;
            opacity: 0.9;
        }
        
        .report-title {
            font-size: 1.55rem;
            font-weight: 800;
            margin-bottom: 1.6rem;
            color: var(--text-primary);
            line-height: 1.25;
            letter-spacing: -0.3px;
        }
        
        .report-excerpt {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2.2rem;
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.95;
        }
        
        .report-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.4rem;
            padding-top: 1.4rem;
            border-top: 1px solid var(--border-color);
        }
        
        .brand-tag {
            padding: 0.45rem 1.1rem;
            border-radius: 20px;
            font-size: 1rem;
            background: rgba(99, 102, 241, 0.28);
            color: var(--primary);
            font-weight: 800;
            border: 1px solid rgba(99, 102, 241, 0.35);
            letter-spacing: -0.2px;
        }
        
        .importance-badge {
            padding: 0.45rem 0.9rem;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 800;
            background: rgba(16, 185, 129, 0.22);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            letter-spacing: -0.2px;
        }
        
        .read-more {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            transition: var(--transition);
            font-size: 1.2rem;
            margin-top: 1.6rem;
            padding: 0.8rem 1.6rem;
            border-radius: 16px;
            border: 2px solid rgba(99, 102, 241, 0.35);
            width: fit-content;
            letter-spacing: -0.3px;
        }
        
        .read-more:hover {
            color: var(--secondary);
            transform: translateX(8px);
            background: rgba(99, 102, 241, 0.12);
            border-color: var(--primary);
        }
        
        /* Footer */
        .footer {
            background: rgba(10, 15, 26, 0.98);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 5rem 0 3.2rem;
            border-top: 1px solid var(--border-color);
            margin-top: 6.5rem;
        }
        
        .footer-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2.2rem;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            display: block;
            margin-bottom: 1.4rem;
            font-size: 1.2rem;
            font-weight: 600;
            opacity: 0.9;
        }
        
        .footer-links a:hover {
            color: var(--primary);
            transform: translateX(8px);
            text-decoration: underline;
        }
        
        .footer-bottom {
            border-top: 1px solid var(--border-color);
            padding-top: 3.2rem;
            margin-top: 3.2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.85;
        }
        
        /* Responsive Design */
        @media (max-width: 992px) {
            .hero-content h1 {
                font-size: 2.9rem;
            }
            
            .hero-content p {
                font-size: 1.25rem;
            }
            
            .btn-container {
                flex-direction: column;
                gap: 1.6rem;
            }
            
            .btn-container .btn {
                width: 100%;
            }
            
            .section-title h2 {
                font-size: 2.6rem;
            }
        }
        
        @media (max-width: 768px) {
            .hero-section {
                padding: 5rem 0 3.5rem;
            }
            
            .hero-content h1 {
                font-size: 2.4rem;
            }
            
            .hero-content p {
                font-size: 1.1rem;
            }
            
            .section-title h2 {
                font-size: 2.1rem;
            }
            
            .kpi-value {
                font-size: 2.4rem;
            }
            
            .intelligence-panel {
                padding: 2.4rem;
            }
            
            .metric-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            
            .metric-value {
                font-size: 1.6rem;
            }
            
            .nav-tabs .nav-link {
                padding: 0.95rem 2rem;
                font-size: 1.1rem;
                margin: 0 0.25rem;
            }
        }
        
        @media (max-width: 576px) {
            .navbar-nav {
                margin-top: 1.6rem;
            }
            
            .kpi-card {
                padding: 2.4rem;
            }
            
            .kpi-value {
                font-size: 2rem;
            }
            
            .report-card {
                padding: 1.9rem;
            }
            
            .report-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

    <script>
        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // Enhanced tab switching with fade animation
        document.querySelectorAll('.nav-tabs .nav-link').forEach(tab => {
            tab.addEventListener('click', function() {
                // Remove active class from all tabs
                document.querySelectorAll('.nav-tabs .nav-link').forEach(t => {
                    t.classList.remove('active');
                });
                // Add active class to clicked tab
                this.classList.add('active');
                
                // Fade out current content
                const currentContent = document.querySelector('.tab-content .tab-pane.show');
                if (currentContent) {
                    currentContent.classList.remove('show', 'active');
                    currentContent.classList.add('fade');
                }
                
                // Get target content and fade in
                const targetId = this.getAttribute('data-bs-target');
                const targetContent = document.querySelector(targetId);
                if (targetContent) {
                    setTimeout(() => {
                        targetContent.classList.remove('fade');
                        targetContent.classList.add('show', 'active');
                    }, 180);
                }
            });
        });
    </script>
</body>
</html>
