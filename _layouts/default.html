<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    
    <!-- Google Fonts - Inter for professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --bg-surface: #0a0f1a;
            --bg-card: rgba(15, 23, 42, 0.85);
            --border-color: rgba(148, 163, 184, 0.15);
            --glow-primary: 0 0 25px rgba(99, 102, 241, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-surface);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 20%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.02) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.02) 25%, transparent 25%);
            background-size: 100% 100%, 100% 100%, 20px 20px, 20px 20px;
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Navigation */
        .navbar {
            background: rgba(10, 15, 26, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 500;
            position: relative;
            transition: var(--transition);
        }
        
        .nav-link:hover {
            color: var(--text-primary) !important;
        }
        
        .nav-link.active {
            color: var(--primary) !important;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }
        
        /* Hero Section */
        .hero-section {
            padding: 6rem 0 4rem;
            position: relative;
        }
        
        .hero-content h1 {
            font-size: 3.25rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, var(--text-primary), #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-content p {
            font-size: 1.35rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 400;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 0.85rem 2.25rem;
            font-weight: 600;
            border-radius: 14px;
            transition: var(--transition);
            box-shadow: var(--glow-primary);
            position: relative;
            overflow: hidden;
            font-size: 1.125rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--glow-primary), 0 12px 30px rgba(99, 102, 241, 0.5);
        }
        
        .btn-outline-light {
            border: 2px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 0.85rem 2.25rem;
            font-weight: 600;
            border-radius: 14px;
            transition: var(--transition);
            font-size: 1.125rem;
        }
        
        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: var(--primary);
            color: var(--primary) !important;
        }
        
        /* Intelligence Panel */
        .intelligence-panel {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 2.75rem;
            box-shadow: var(--glow-primary);
            height: 100%;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .intelligence-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            opacity: 0.3;
            z-index: -1;
        }
        
        .intelligence-panel:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.6);
        }
        
        .panel-title {
            font-size: 1.65rem;
            font-weight: 800;
            margin-bottom: 2.25rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .panel-title i {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .metric-item {
            display: flex;
            align-items: center;
            margin-bottom: 1.75rem;
            padding-bottom: 1.75rem;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .metric-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .metric-item:hover {
            transform: translateX(6px);
        }
        
        .metric-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.5rem;
            font-size: 1.65rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.15));
            transition: var(--transition);
        }
        
        .metric-value {
            font-size: 1.85rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
            color: var(--text-primary);
            line-height: 1.2;
        }
        
        .metric-label {
            font-size: 1.05rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .trend-chart {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 14px;
            padding: 1.5rem;
            margin-top: 1.75rem;
            text-align: center;
            font-size: 1.05rem;
            color: var(--text-secondary);
            transition: var(--transition);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .trend-chart:hover {
            background: rgba(99, 102, 241, 0.15);
            transform: translateY(-3px);
            border-color: rgba(99, 102, 241, 0.4);
        }
        
        /* Market Summary Bar */
        .market-summary-bar {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.08));
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 18px;
            padding: 1.75rem 2.75rem;
            margin: 3.5rem 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        
        .market-summary-bar:hover {
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
            box-shadow: var(--glow-primary);
        }
        
        .summary-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 2rem;
        }
        
        .summary-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
            font-size: 1.25rem;
            font-weight: 500;
        }
        
        .summary-item strong {
            color: var(--text-primary);
            font-weight: 700;
        }
        
        .summary-item i {
            color: var(--primary);
            font-size: 1.35rem;
        }
        
        /* KPI Cards */
        .kpi-section {
            padding: 5.5rem 0;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .section-title h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section-title p {
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.7;
            font-size: 1.25rem;
            font-weight: 400;
        }
        
        .kpi-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 3rem;
            text-align: center;
            transition: var(--transition);
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
        }
        
        .kpi-card:hover {
            transform: translateY(-10px);
            border-color: rgba(99, 102, 241, 0.7);
            box-shadow: var(--glow-primary), 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        
        .kpi-card:hover::before {
            opacity: 1;
        }
        
        .kpi-icon {
            font-size: 3.25rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .kpi-value {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            line-height: 1.1;
        }
        
        .kpi-label {
            font-size: 1.35rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        .kpi-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1.25rem;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            background: rgba(16, 185, 129, 0.25);
            color: #10b981;
            margin-top: 0.75rem;
            transition: var(--transition);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .kpi-badge.info {
            background: rgba(6, 182, 212, 0.25);
            color: #06b6d4;
            border-color: rgba(6, 182, 212, 0.3);
        }
        
        .kpi-badge.warning {
            background: rgba(245, 158, 11, 0.25);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.3);
        }
        
        .kpi-source {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 1rem;
            font-weight: 400;
            line-height: 1.5;
        }
        
        .mini-trend {
            display: flex;
            justify-content: center;
            margin-top: 1.25rem;
            height: 30px;
            align-items: center;
        }
        
        .mini-trend-bar {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            position: relative;
        }
        
        /* Report Tabs */
        .report-tabs {
            background: var(--bg-surface);
            padding: 5.5rem 0;
        }
        
        .nav-tabs {
            border-bottom: none;
            justify-content: center;
            margin-bottom: 3rem;
            gap: 0.75rem;
            padding: 0 2rem;
        }
        
        .nav-tabs .nav-link {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 18px;
            padding: 1rem 2.75rem;
            margin: 0 0.35rem;
            color: var(--text-secondary) !important;
            font-weight: 700;
            font-size: 1.25rem;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .nav-tabs .nav-link:hover {
            border-color: var(--primary);
            color: var(--primary) !important;
            transform: translateY(-3px);
        }
        
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white !important;
            border-color: var(--primary);
            transform: translateY(-6px);
            box-shadow: var(--glow-primary);
        }
        
        .tab-content {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 0 0 22px 22px;
            padding: 3rem;
            animation: fadeIn 0.6s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Report Cards */
        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 2.25rem;
            transition: var(--transition);
            height: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }
        
        .report-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
        }
        
        .report-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.7);
            box-shadow: var(--glow-primary), 0 20px 40px rgba(0, 0, 0, 0.35);
        }
        
        .report-card:hover::before {
            opacity: 1;
        }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.5rem;
            gap: 1.25rem;
        }
        
        .report-type {
            padding: 0.45rem 1.5rem;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }
        
        .report-date {
            color: var(--text-secondary);
            font-size: 1.05rem;
            font-weight: 600;
            align-self: center;
        }
        
        .report-title {
            font-size: 1.45rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            line-height: 1.3;
        }
        
        .report-excerpt {
            color: var(--text-secondary);
            line-height: 1.75;
            margin-bottom: 2rem;
            font-size: 1.15rem;
            font-weight: 400;
        }
        
        .report-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border-color);
        }
        
        .brand-tag {
            padding: 0.4rem 1rem;
            border-radius: 18px;
            font-size: 0.95rem;
            background: rgba(99, 102, 241, 0.25);
            color: var(--primary);
            font-weight: 700;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .importance-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 700;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .importance-badge.high {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.3);
        }
        
        .importance-badge.critical {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .read-more {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition);
            font-size: 1.15rem;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 14px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            width: fit-content;
        }
        
        .read-more:hover {
            color: var(--secondary);
            transform: translateX(6px);
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }
        
        .read-more i {
            font-size: 1rem;
            transition: var(--transition);
        }
        
        .read-more:hover i {
            transform: translateX(4px);
        }
        
        /* Hot Brands Ranking */
        .hot-brands-section {
            padding: 5rem 0;
        }
        
        .brand-rank-item {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            transition: var(--transition);
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border-color);
        }
        
        .brand-rank-item:hover {
            background: rgba(99, 102, 241, 0.25);
            transform: translateX(6px);
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        .rank-number {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-right: 1.5rem;
            font-size: 1.25rem;
            box-shadow: var(--glow-primary);
        }
        
        .brand-info {
            flex: 1;
        }
        
        .brand-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }
        
        .brand-metric {
            color: var(--text-secondary);
            font-size: 1.05rem;
            font-weight: 500;
        }
        
        .trend-indicator {
            color: var(--success);
            font-weight: 800;
            margin-left: 0.75rem;
            font-size: 1.1rem;
        }
        
        .trend-indicator.down {
            color: var(--danger);
        }
        
        /* Trend Chart Section */
        .trend-chart-section {
            padding: 5rem 0;
        }
        
        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 3rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        .chart-placeholder {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            margin: 2rem 0;
        }
        
        /* Keywords Section */
        .keywords-section {
            padding: 4rem 0;
        }
        
        .keyword-badge {
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-size: 1.15rem;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            font-weight: 700;
            transition: var(--transition);
            border: 1px solid rgba(99, 102, 241, 0.3);
            margin: 0.5rem;
        }
        
        .keyword-badge:hover {
            background: rgba(99, 102, 241, 0.35);
            transform: translateY(-3px);
            border-color: var(--primary);
        }
        
        /* Trust & Methodology */
        .trust-section {
            background: var(--bg-surface);
            padding: 5.5rem 0;
        }
        
        .trust-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 3rem;
            text-align: center;
            transition: var(--transition);
            height: 100%;
        }
        
        .trust-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.7);
            box-shadow: var(--glow-primary), 0 20px 40px rgba(0, 0, 0, 0.35);
        }
        
        .trust-icon {
            font-size: 2.75rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .trust-title {
            font-size: 1.45rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }
        
        .trust-content {
            color: var(--text-secondary);
            line-height: 1.75;
            font-size: 1.15rem;
            font-weight: 400;
        }
        
        /* Footer */
        .footer {
            background: rgba(10, 15, 26, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 4.5rem 0 3rem;
            border-top: 1px solid var(--border-color);
            margin-top: 6rem;
        }
        
        .footer-title {
            font-size: 1.65rem;

    <script>
        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // Enhanced tab switching with fade animation
        document.querySelectorAll('.nav-tabs .nav-link').forEach(tab => {
            tab.addEventListener('click', function() {
                // Remove active class from all tabs
                document.querySelectorAll('.nav-tabs .nav-link').forEach(t => {
                    t.classList.remove('active');
                });
                // Add active class to clicked tab
                this.classList.add('active');
                
                // Fade out current content
                const currentContent = document.querySelector('.tab-content .tab-pane.show');
                if (currentContent) {
                    currentContent.classList.remove('show', 'active');
                    currentContent.classList.add('fade');
                }
                
                // Get target content and fade in
                const targetId = this.getAttribute('data-bs-target');
                const targetContent = document.querySelector(targetId);
                if (targetContent) {
                    setTimeout(() => {
                        targetContent.classList.remove('fade');
                        targetContent.classList.add('show', 'active');
                    }, 150);
                }
            });
        });
    </script>
